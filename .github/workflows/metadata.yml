name: Generate NFT Metadata from Traits CSV and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create Auto Indexing Python Script
        run: |
          cat << 'EOF' > generate.py
          import os
          import csv
          import json

          os.makedirs('metadata-output', exist_ok=True)

          csv_file_path = 'apesyndicatetraits_2.csv'
          if not os.path.exists(csv_file_path):
              print("Error: apesyndicatetraits_2.csv file not found!")
              exit(1)

          with open(csv_file_path, mode='r', encoding='utf-8-sig') as f:
              reader = csv.DictReader(f)
              
              for index, row in enumerate(reader, start=1):
                  token_id = str(index)
                  
                  nft_data = {
                      "name": f"Ape Syndicate #{token_id}",
                      "description": "Official Ape Syndicate NFT Collection.",
                      "image": f"https://apesyndicate.github.io/ApeSyndicateImage/{token_id}.png",
                      "attributes": []
                  }
                  
                  has_valid_traits = False
                  for key, value in row.items():
                      if not key or not key.strip():
                          continue
                      if key.lower() in ['token_id', 'id', 'name', 'description', 'image']:
                          continue
                      
                      if value and value.strip() and value.strip().lower() != 'none':
                          has_valid_traits = True
                          nft_data["attributes"].append({
                              "trait_type": key.strip(),
                              "value": value.strip()
                          })
                  
                  if has_valid_traits or index <= 555:
                      output_file_path = os.path.join('metadata-output', token_id)
                      with open(output_file_path, 'w', encoding='utf-8') as out_f:
                          json.dump(nft_data, out_f, indent=4)

          print("Successfully generated all metadata files using automatic row index sequencing.")
          EOF

      - name: Run Metadata Generation Script
        run: python generate.py

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Metadata Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './metadata-output'

      - name: Deploy Metadata to Live Infrastructure
        id: deployment
        uses: actions/deploy-pages@v4
